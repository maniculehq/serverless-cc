name: Update Claude Code bundle

# Once a day, check npm for a newer Claude Code release. If
# @anthropic-ai/claude-code@latest is ahead of the pinned version
# (bin/cli.js.version), verify the new version still fetches + extracts + patches
# + runs (scripts/fetch-cli.mjs), then bump ONLY the pin and push to main.
#
# bin/cli.js itself is NEVER committed — it's fetched and carved at build time
# (scripts/fetch-cli.mjs, wired into `bun run build`). This job's job is just to
# move the pin forward, with a smoke test guarding against a broken release.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {} # allow manual runs

# Needed so the job can push the bumped pin back to main.
permissions:
  contents: write

# Never let two updater runs race on a push to main.
concurrency:
  group: update-claude-code
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check npm for a newer version
        id: check
        run: |
          set -euo pipefail
          latest="$(npm view @anthropic-ai/claude-code version)"
          current="$(cat bin/cli.js.version 2>/dev/null || echo none)"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude Code $latest available (pinned at $current) — verifying."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Pinned at $current — nothing to do."
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.changed == 'true'

      - name: Verify the new version fetches, extracts, patches, and runs
        if: steps.check.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$LATEST" > bin/cli.js.version
          # Fetch + carve + patch bin/cli.js (NOT committed — build-time artifact).
          FORCE_FETCH_CLI=1 bun scripts/fetch-cli.mjs
          # Safety gate: only bump the pin if the patched bundle actually runs on a
          # stock Bun and self-reports the version we just pinned.
          got="$(timeout 60 bun bin/cli.js --version | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')"
          if [ "$got" != "$LATEST" ]; then
            echo "::error::patched bundle reports '$got', expected '$LATEST' — not bumping the pin."
            exit 1
          fi
          echo "::notice::verified — Claude Code $got fetches and runs."

      - name: Commit + push the version bump to main
        if: steps.check.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only the pin is tracked; bin/cli.js is gitignored (build-time artifact).
          git add bin/cli.js.version
          if git diff --cached --quiet; then
            echo "::notice::pin already at $LATEST — skipping commit."
            exit 0
          fi
          git commit -m "chore(cli): pin Claude Code bundle to ${LATEST}" \
                     -m "Automated: verified @anthropic-ai/claude-code@${LATEST} fetches + extracts + patches + runs (scripts/fetch-cli.mjs)."
          git push origin HEAD:main
